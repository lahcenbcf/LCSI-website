version: "3.8"

services:
  app:
    build: .
    container_name: lcsi_app
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    container_name: lcsi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lcsi_user
      POSTGRES_PASSWORD: lcsi_pass
      POSTGRES_DB: lcsi_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lcsi_user -d lcsi_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: lcsi_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  caddy:
    image: caddy:2
    container_name: lcsi_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
